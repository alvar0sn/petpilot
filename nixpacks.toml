[variables]
NIXPACKS_PHP_VERSION = "8.4"
NIXPACKS_PHP_EXTENSIONS = "pdo_pgsql,redis,gd,mbstring,xml,curl,zip,intl,tokenizer,ctype,bcmath,fileinfo"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install --legacy-peer-deps",
    "npm run build"
]

[start]
cmd = "bash start.sh"
