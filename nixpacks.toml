[variables]
NIXPACKS_PHP_VERSION = "8.4"
NIXPACKS_PHP_EXTENSIONS = "pdo_pgsql,redis,gd,mbstring,xml,curl,zip,intl,tokenizer,ctype,bcmath,fileinfo"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install --legacy-peer-deps",
    "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=SuperAdminSeeder --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan schedule:work & php artisan queue:work --sleep=3 --tries=3 & php -S 0.0.0.0:$PORT -t public"
