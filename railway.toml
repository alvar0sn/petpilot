[build]
builder = "NIXPACKS"

[deploy]
startCommand = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan schedule:work & php artisan queue:work --sleep=3 --tries=3 & php -S 0.0.0.0:$PORT -t public"
healthcheckPath = "/up"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
